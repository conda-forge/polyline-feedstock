{% set name = "polyline" %}
{% set version = "2.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/polyline-{{ version }}.tar.gz
  sha256: f05ade694522bf1720febebe1672f820f43a13c6a1664751e7769d47e8ca9b1b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - polyline
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/polyline/
  summary: A Python implementation of Google's Encoded Polyline Algorithm Format.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
