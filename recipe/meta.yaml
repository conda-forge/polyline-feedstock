{% set name = "polyline" %}
{% set version = "2.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/polyline-{{ version }}.tar.gz
  sha256: 10541e759c5fd51f746ee304e9af94744089a4055b6257b293b3afd1df64e369

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - polyline
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/polyline/
  summary: A Python implementation of Google's Encoded Polyline Algorithm Format.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
